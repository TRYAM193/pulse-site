<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — PulseSite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── RESET & BASE ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:           #080c14;
      --indigo:       #6366f1;
      --purple:       #a855f7;
      --card-bg:      rgba(255,255,255,0.04);
      --card-border:  rgba(255,255,255,0.08);
      --input-bg:     rgba(255,255,255,0.05);
      --input-border: rgba(255,255,255,0.10);
      --muted:        #9ca3af;
      --dim:          #6b7280;
      --white:        #ffffff;
      --radius:       24px;
      --r-input:      12px;
    }
    [data-theme="light"] {
      --bg:           #f8fafc;
      --card-bg:      #ffffff;
      --card-border:  rgba(15, 23, 42, 0.12);
      --input-bg:     #f1f5f9;
      --input-border: #cbd5e1;
      --muted:        #475569;
      --white:        #0f172a;
    }
      --ease:         0.3s cubic-bezier(0.4,0,0.2,1);
    }
    html, body { height: 100%; width: 100%; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* ── DOT GRID ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(99,102,241,0.16) 1px, transparent 1px);
      background-size: 36px 36px;
      animation: gridDrift 22s linear infinite;
      z-index: 0;
      pointer-events: none;
    }
    @keyframes gridDrift { 0% { background-position: 0 0; } 100% { background-position: 36px 36px; } }

    /* ── GLOW SPHERES ── */
    .glow-sphere {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 720px; height: 720px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, rgba(168,85,247,0.26) 0%, rgba(99,102,241,0.20) 35%, rgba(99,102,241,0.07) 60%, transparent 80%);
      filter: blur(80px);
      animation: spherePulse 9s ease-in-out infinite alternate;
      z-index: 0; pointer-events: none;
    }
    @keyframes spherePulse {
      0%   { transform: translate(-50%,-50%) scale(1);    opacity: 0.8; }
      50%  { transform: translate(-50%,-52%) scale(1.07); opacity: 1; }
      100% { transform: translate(-50%,-48%) scale(0.95); opacity: 0.72; }
    }
    .glow-sphere-2 {
      position: fixed;
      bottom: -130px; right: -130px;
      width: 520px; height: 520px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99,102,241,0.13) 0%, transparent 70%);
      filter: blur(90px);
      animation: s2 13s ease-in-out infinite alternate;
      z-index: 0; pointer-events: none;
    }
    @keyframes s2 { from { opacity: 0.55; transform: scale(1); } to { opacity: 1; transform: scale(1.12); } }

    /* ── PAGE WRAPPER ── */
    .page-wrapper {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 28px;
      width: 100%; padding: 24px 16px;
    }

    /* ── GLASSMORPHIC CARD ── */
    .card {
      width: 100%; max-width: 450px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 48px 44px 44px;
      box-shadow: 0 0 0 1px rgba(99,102,241,0.05), 0 32px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
      animation: cardReveal 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes cardReveal { from { opacity: 0; transform: translateY(32px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }

    /* ── BRAND ── */
    .brand { text-align: center; margin-bottom: 36px; }
    .logo-ring {
      display: inline-flex; align-items: center; justify-content: center;
      width: 58px; height: 58px; border-radius: 16px;
      background: linear-gradient(135deg, rgba(99,102,241,0.18), rgba(168,85,247,0.18));
      border: 1px solid rgba(99,102,241,0.28);
      margin-bottom: 20px;
      animation: logoGlow 3s ease-in-out infinite alternate;
    }
    @keyframes logoGlow { from { box-shadow: 0 0 12px rgba(99,102,241,0.22); } to { box-shadow: 0 0 30px rgba(168,85,247,0.48); } }
    .logo-ring svg { width: 28px; height: 28px; }
    .brand-name {
      font-size: 2rem; font-weight: 800; letter-spacing: -0.02em;
      background: linear-gradient(135deg, #6366f1 20%, #a855f7 80%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      line-height: 1.15; margin-bottom: 8px;
    }
    .brand-sub { font-size: 0.875rem; font-weight: 400; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07) 30%, rgba(99,102,241,0.14) 50%, rgba(255,255,255,0.07) 70%, transparent);
      margin: 0 0 32px;
    }

    /* ── FORM ── */
    form { display: flex; flex-direction: column; gap: 20px; }
    .field { position: relative; }
    .field input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: var(--r-input);
      color: var(--white);
      font-family: 'Outfit', sans-serif;
      font-size: 0.975rem; font-weight: 400;
      padding: 22px 44px 8px 18px;
      outline: none;
      transition: border-color var(--ease), box-shadow var(--ease), background var(--ease);
      -webkit-text-fill-color: var(--white);
      caret-color: var(--indigo);
    }
    .field input:-webkit-autofill,
    .field input:-webkit-autofill:hover,
    .field input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px #0d1120 inset;
      -webkit-text-fill-color: #ffffff;
      transition: background-color 5000s ease-in-out 0s;
    }
    .field input::placeholder { color: transparent; }
    .field label {
      position: absolute; left: 18px; top: 50%;
      transform: translateY(-50%);
      font-size: 0.9rem; font-weight: 400;
      color: var(--muted);
      pointer-events: none;
      transition: top var(--ease), font-size var(--ease), color var(--ease), font-weight var(--ease);
    }
    .field input:focus ~ label,
    .field input:not(:placeholder-shown) ~ label {
      top: 10px; transform: translateY(0);
      font-size: 0.68rem; font-weight: 600;
      color: var(--indigo); letter-spacing: 0.05em; text-transform: uppercase;
    }
    .field input:focus {
      border-color: var(--indigo);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
      background: rgba(255,255,255,0.07);
    }
    .field .input-icon {
      position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
      color: var(--dim); pointer-events: none;
      transition: color var(--ease);
    }
    .field input:focus ~ .input-icon { color: var(--indigo); }
    .field .toggle-pw {
      position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--dim); padding: 4px;
      display: flex; align-items: center;
      transition: color var(--ease);
    }
    .field .toggle-pw:hover { color: var(--indigo); }
    .field-extras { display: flex; justify-content: flex-end; margin-top: -8px; }
    .field-extras a { font-size: 0.8rem; color: var(--muted); text-decoration: none; transition: color var(--ease); }
    .field-extras a:hover { color: var(--indigo); }

    /* ── ERROR ── */
    .error-msg {
      display: none; align-items: center; gap: 10px;
      background: rgba(239,68,68,0.10);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 10px; padding: 12px 16px;
      font-size: 0.86rem; color: #fca5a5;
      animation: shakeIn 0.4s cubic-bezier(0.36,0.07,0.19,0.97);
    }
    .error-msg.visible { display: flex; }
    @keyframes shakeIn {
      0%  { transform: translateX(0); } 20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }  60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }  100% { transform: translateX(0); }
    }

    /* ── SUBMIT BUTTON ── */
    .btn-submit {
      width: 100%; padding: 1rem 1.5rem;
      background: linear-gradient(135deg, var(--indigo), var(--purple));
      border: none; border-radius: var(--r-input);
      color: var(--white);
      font-family: 'Outfit', sans-serif; font-size: 1.05rem; font-weight: 700;
      cursor: pointer; position: relative; overflow: hidden;
      transition: transform var(--ease), box-shadow var(--ease), opacity var(--ease);
      box-shadow: 0 4px 20px rgba(99,102,241,0.35), 0 1px 3px rgba(0,0,0,0.3);
      margin-top: 4px;
    }
    .btn-submit::after {
      content: ''; position: absolute; top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.5s ease;
    }
    .btn-submit:hover:not(:disabled)::after { left: 160%; }
    .btn-submit:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(99,102,241,0.55), 0 2px 8px rgba(0,0,0,0.4);
    }
    .btn-submit:active:not(:disabled) { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.65; cursor: not-allowed; }
    .btn-inner { display: flex; align-items: center; justify-content: center; gap: 8px; }
    .spinner {
      display: none; width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    .btn-submit.loading .spinner { display: inline-block; }
    .btn-submit.loading .btn-text { opacity: 0.75; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── VERIFY OVERLAY ── */
    #verify-overlay {
      position: fixed; inset: 0;
      background: var(--bg); z-index: 999;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 20px;
      transition: opacity 0.45s ease;
    }
    #verify-overlay.hidden { opacity: 0; pointer-events: none; }
    .verify-spinner {
      width: 42px; height: 42px;
      border: 3px solid rgba(99,102,241,0.18); border-top-color: var(--indigo);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    .verify-text { font-size: 0.875rem; color: var(--muted); font-weight: 300; letter-spacing: 0.05em; }

    /* ── FOOTER ── */
    .page-footer {
      font-size: 0.78rem; color: var(--dim); font-weight: 300;
      letter-spacing: 0.04em;
      display: flex; align-items: center; gap: 8px;
      opacity: 0.7;
      animation: cardReveal 0.9s cubic-bezier(0.22,1,0.36,1) 0.15s both;
    }

    @media (max-width: 500px) {
      .card { padding: 36px 24px 32px; border-radius: 20px; }
    }
  </style>
</head>
<body>

  <!-- VERIFY OVERLAY -->
  <div id="verify-overlay" role="status" aria-live="polite">
    <div class="verify-spinner"></div>
    <span class="verify-text">Verifying session…</span>
  </div>

  <!-- BACKGROUND -->
  <div class="glow-sphere"   aria-hidden="true"></div>
  <div class="glow-sphere-2" aria-hidden="true"></div>

  <!-- MAIN -->
  <div class="page-wrapper">
    <div class="card" role="main">

      <!-- Brand Header -->
      <div class="brand">
        <div class="logo-ring" aria-hidden="true">
          <svg width="42" height="42" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="10" fill="url(#silverCardGrad)"/>
            <rect x="0.5" y="0.5" width="31" height="31" rx="9.5" stroke="url(#silverBorderGrad)" stroke-opacity="0.4"/>
            <path d="M6 16H10.5L13 9L17 23L20 13.5L22.5 16H26" stroke="url(#pulseLineGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="silverCardGrad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse"><stop stop-color="#1e2433"/><stop offset="1" stop-color="#090c14"/></linearGradient>
              <linearGradient id="silverBorderGrad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse"><stop stop-color="#ffffff"/><stop offset="1" stop-color="#475569"/></linearGradient>
              <linearGradient id="pulseLineGrad" x1="6" y1="9" x2="26" y2="23" gradientUnits="userSpaceOnUse"><stop stop-color="#ffffff"/><stop offset="0.5" stop-color="#cbd5e1"/><stop offset="1" stop-color="#94a3b8"/></linearGradient>
            </defs>
          </svg>
        </div>
        <div class="brand-name">PulseSite</div>
        <div class="brand-sub">Admin Console</div>
      </div>

      <div class="divider" aria-hidden="true"></div>

      <!-- Error Banner -->
      <div class="error-msg" id="error-msg" role="alert" aria-live="assertive">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="8" cy="8" r="7" stroke="#f87171" stroke-width="1.5"/>
          <path d="M8 5v3.5" stroke="#f87171" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="8" cy="11" r="0.75" fill="#f87171"/>
        </svg>
        <span id="error-text">Invalid credentials. Please try again.</span>
      </div>

      <!-- Login Form -->
      <form id="login-form" novalidate autocomplete="on">

        <!-- Email Field -->
        <div class="field">
          <input
            type="email" id="email" name="email"
            placeholder="admin@autoagency.io"
            autocomplete="username" required
            aria-label="Email address" aria-required="true"
          />
          <label for="email">Email Address</label>
          <svg class="input-icon" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <rect x="1.5" y="4" width="15" height="10" rx="2" stroke="currentColor" stroke-width="1.4"/>
            <path d="M1.5 6.5l7.5 4.5 7.5-4.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </div>

        <!-- Password Field -->
        <div class="field">
          <input
            type="password" id="password" name="password"
            placeholder="secret"
            autocomplete="current-password" required
            aria-label="Password" aria-required="true"
          />
          <label for="password">Password</label>
          <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Show password">
            <svg id="icon-eye" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
              <path d="M1.5 9C1.5 9 4 3.75 9 3.75S16.5 9 16.5 9 14 14.25 9 14.25 1.5 9 1.5 9Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
              <circle cx="9" cy="9" r="2.25" stroke="currentColor" stroke-width="1.4"/>
            </svg>
            <svg id="icon-eye-off" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true" style="display:none">
              <path d="M2.25 2.25l13.5 13.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              <path d="M7.42 7.53A2.25 2.25 0 0110.5 10.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              <path d="M5.25 5.35C3.44 6.5 1.5 9 1.5 9s2.5 5.25 7.5 5.25c1.43 0 2.7-.37 3.77-.96" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              <path d="M10.8 4.2C10.23 3.93 9.63 3.75 9 3.75c-5 0-7.5 5.25-7.5 5.25s.47.88 1.35 1.87" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
          </button>
        </div>

        <!-- Forgot Password -->
        <div class="field-extras">
          <a href="#" tabindex="-1">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-submit" id="btn-submit">
          <span class="btn-inner">
            <span class="spinner" id="spinner" aria-hidden="true"></span>
            <span class="btn-text" id="btn-text">Sign In to Console</span>
          </span>
        </button>

      </form>
    </div><!-- /.card -->

    <!-- Page Footer -->
    <footer class="page-footer">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
        <rect x="1.5" y="5.5" width="10" height="7" rx="1.5" stroke="#6b7280" stroke-width="1.3"/>
        <path d="M4 5.5V3.5a2.5 2.5 0 015 0v2" stroke="#6b7280" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      Secured Console &mdash; AutoAgency v2.0
    </footer>
  </div><!-- /.page-wrapper -->

  <script>
    /* ── CONSTANTS ── */
    const TOKEN_KEY       = 'admin_token';
    const LOGIN_ENDPOINT  = '/api/admin/login';
    const VERIFY_ENDPOINT = '/api/admin/verify';
    const ADMIN_REDIRECT  = '/admin';

    /* ── ELEMENT REFS ── */
    const overlay   = document.getElementById('verify-overlay');
    const form      = document.getElementById('login-form');
    const emailEl   = document.getElementById('email');
    const pwEl      = document.getElementById('password');
    const toggleBtn = document.getElementById('toggle-pw');
    const iconEye   = document.getElementById('icon-eye');
    const iconOff   = document.getElementById('icon-eye-off');
    const submitBtn = document.getElementById('btn-submit');
    const btnText   = document.getElementById('btn-text');
    const spinEl    = document.getElementById('spinner');
    const errorDiv  = document.getElementById('error-msg');
    const errorText = document.getElementById('error-text');

    /* ── HELPERS ── */
    function showError(msg) {
      errorText.textContent = msg || 'An unexpected error occurred.';
      errorDiv.classList.add('visible');
      // Re-trigger shake animation
      errorDiv.style.animation = 'none';
      void errorDiv.offsetHeight;
      errorDiv.style.animation = '';
    }
    function hideError() { errorDiv.classList.remove('visible'); }

    function setLoading(on) {
      submitBtn.disabled = on;
      submitBtn.classList.toggle('loading', on);
      btnText.textContent = on ? 'Signing in\u2026' : 'Sign In to Console';
    }

    function goToAdmin() { window.location.href = ADMIN_REDIRECT; }

    function hideOverlay() {
      overlay.classList.add('hidden');
      overlay.addEventListener('transitionend', () => overlay.remove(), { once: true });
    }

    /* ── ON LOAD: VERIFY EXISTING TOKEN ── */
    (async function checkToken() {
      const token = localStorage.getItem(TOKEN_KEY);
      if (!token) { hideOverlay(); return; }
      try {
        const res = await fetch(VERIFY_ENDPOINT, {
          method: 'GET',
          headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }
        });
        if (res.ok) {
          goToAdmin(); // valid — skip login
        } else {
          localStorage.removeItem(TOKEN_KEY);
          hideOverlay();
        }
      } catch (err) {
        console.warn('[AutoAgency] Token verify error:', err.message);
        hideOverlay();
      }
    })();

    /* ── PASSWORD TOGGLE ── */
    toggleBtn.addEventListener('click', () => {
      const show = pwEl.type === 'password';
      pwEl.type = show ? 'text' : 'password';
      iconEye.style.display = show ? 'none'  : 'block';
      iconOff.style.display = show ? 'block' : 'none';
      toggleBtn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
    });

    /* ── FORM SUBMIT ── */
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const email    = emailEl.value.trim();
      const password = pwEl.value;

      if (!email || !password) {
        showError('Please enter both your email and password.');
        return;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showError('Please enter a valid email address.');
        emailEl.focus();
        return;
      }

      setLoading(true);

      try {
        const res = await fetch(LOGIN_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        let data = {};
        try { data = await res.json(); } catch (_) {}

        if (res.ok && data.token) {
          // Success
          localStorage.setItem(TOKEN_KEY, data.token);
          btnText.textContent = 'Redirecting\u2026';
          goToAdmin();
        } else {
          const msg =
            data.message || data.error ||
            (res.status === 401 ? 'Invalid email or password. Please try again.'
              : res.status === 429 ? 'Too many attempts. Please wait and try again.'
              : res.status >= 500 ? 'Server error. Please try again later.'
              : 'Sign in failed. Please check your credentials.');
          showError(msg);
          setLoading(false);
          pwEl.value = '';
          pwEl.focus();
        }
      } catch (err) {
        console.error('[AutoAgency] Login error:', err);
        showError('Unable to reach the server. Check your connection and try again.');
        setLoading(false);
      }
    });

    /* ── CLEAR ERROR ON INPUT ── */
    [emailEl, pwEl].forEach(el => el.addEventListener('input', hideError));

    /* ── UNIFIED THEME SYNC ── */
    (function syncTheme() {
      const savedTheme = localStorage.getItem('pulsesite_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
</body>
</html>
